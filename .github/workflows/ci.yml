name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lua-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Syntax check
        run: luac5.4 -p *.lua

      - name: Run Lua tests
        run: |
          for f in tests/*.lua; do
            echo "RUN:$f"
            lua5.4 "$f"
          done
